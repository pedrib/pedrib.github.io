---
layout: default
title: Services
---

{% for post in site.posts %}

	{% if forloop.index == 1 %}
		{% assign class = 'container post' %}
	{% else %}
	   {% assign class = 'container post separator' %}
	{% endif %}
	
	<article class="{{ class }}">
		
		<h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
		<div class="post-content span-15 last">
			{{ post.content }}
		</div>
	</article>

{% endfor %}
